<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connor Timepieces</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: #0B0B0F;
  color: #E8E4DD;
  min-height: 100vh;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.sans { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid rgba(201,168,76,0.15);
  position: relative;
  z-index: 10;
  backdrop-filter: blur(10px);
  background: rgba(11,11,15,0.85);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
}

.logo-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid #C9A84C;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: rgba(201,168,76,0.05);
  flex-shrink: 0;
}

.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.brand-name {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #C9A84C;
  line-height: 1.1;
}

.brand-sub {
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.5);
  margin-top: 2px;
}

.nav { display: flex; gap: 8px; align-items: center; }

.nav-btn {
  padding: 8px 20px;
  background: transparent;
  border: 1px solid transparent;
  color: rgba(232,228,221,0.5);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.nav-btn:hover { color: #C9A84C; }
.nav-btn.active {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  color: #C9A84C;
}
.nav-btn.logout { color: rgba(239,83,80,0.6); }
.nav-btn.logout:hover { color: #EF5350; }

/* HIDDEN FILE INPUT */
.hidden-input { display: none; }

/* HERO */
.hero {
  padding: 60px 28px;
  text-align: center;
  position: relative;
  z-index: 5;
}

.hero-sub {
  font-size: 11px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.4);
  margin-bottom: 16px;
}

.hero h1 {
  font-size: 52px;
  font-weight: 600;
  color: #E8E4DD;
  line-height: 1.1;
}

.hero-line {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #C9A84C, transparent);
  margin: 20px auto 0;
}

/* SECTIONS */
.section {
  position: relative;
  z-index: 5;
  padding: 32px 28px;
}

.section-title {
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #C9A84C;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.title-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
}

/* NEW ARRIVALS SCROLL */
.arrivals-row {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 16px;
}

.arrivals-row::-webkit-scrollbar { height: 4px; }
.arrivals-row::-webkit-scrollbar-track { background: transparent; }
.arrivals-row::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }

.arrival-card {
  min-width: 260px;
  background: linear-gradient(165deg, rgba(201,168,76,0.06), rgba(11,11,15,0.95));
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 8px;
  padding: 20px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  transition: border-color 0.4s ease;
}

.arrival-card:hover { border-color: rgba(201,168,76,0.3); }

.arrival-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #C9A84C;
  color: #0B0B0F;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 2px;
  text-transform: uppercase;
}

.arrival-img-box, .card-img-box {
  width: 100%;
  border-radius: 6px;
  background: rgba(201,168,76,0.04);
  border: 1px solid rgba(201,168,76,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 16px;
}

.arrival-img-box { height: 160px; }
.card-img-box { height: 180px; }

.arrival-img-box img, .card-img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  align-items: center;
}

.search-input {
  padding: 8px 16px;
  background: rgba(232,228,221,0.04);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 13px;
  outline: none;
  min-width: 200px;
}

.search-input:focus { border-color: rgba(201,168,76,0.3); }

.filter-chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid rgba(201,168,76,0.12);
  background: transparent;
  color: rgba(232,228,221,0.4);
  transition: all 0.3s ease;
}

.filter-chip:hover { color: #C9A84C; border-color: rgba(201,168,76,0.25); }
.filter-chip.active {
  border-color: #C9A84C;
  background: rgba(201,168,76,0.12);
  color: #C9A84C;
}

.sort-select {
  padding: 8px 16px;
  background: rgba(232,228,221,0.04);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 13px;
  outline: none;
  min-width: 140px;
}

.sort-select option { background: #14141A; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.card {
  background: rgba(201,168,76,0.03);
  border: 1px solid rgba(201,168,76,0.1);
  border-radius: 8px;
  padding: 20px;
  transition: border-color 0.3s ease;
}

.card:hover { border-color: rgba(201,168,76,0.25); }

.watch-brand {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.6);
  margin-bottom: 2px;
}

.watch-name {
  font-size: 20px;
  font-weight: 600;
  color: #E8E4DD;
  line-height: 1.2;
  margin-bottom: 2px;
}

.watch-price {
  font-size: 24px;
  color: #C9A84C;
  font-weight: 600;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(232,228,221,0.4);
  margin-bottom: 4px;
}

.cond-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 2px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.cond-new {
  background: rgba(76,175,80,0.12);
  color: #66BB6A;
  border: 1px solid rgba(76,175,80,0.2);
}

.cond-preowned {
  background: rgba(201,168,76,0.12);
  color: #C9A84C;
  border: 1px solid rgba(201,168,76,0.2);
}

.card-footer {
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-actions { display: flex; gap: 6px; }

/* BUTTONS */
.btn-primary {
  padding: 10px 28px;
  background: linear-gradient(135deg, #C9A84C, #A8882A);
  color: #0B0B0F;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.btn-primary:hover { filter: brightness(1.1); }

.btn-edit {
  padding: 6px 16px;
  background: rgba(201,168,76,0.1);
  color: #C9A84C;
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.btn-edit:hover { background: rgba(201,168,76,0.2); }

.btn-danger {
  padding: 6px 16px;
  background: rgba(239,83,80,0.1);
  color: #EF5350;
  border: 1px solid rgba(239,83,80,0.2);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.btn-danger:hover { background: rgba(239,83,80,0.2); }

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat {
  text-align: center;
  padding: 20px;
  background: rgba(201,168,76,0.04);
  border: 1px solid rgba(201,168,76,0.08);
  border-radius: 8px;
}

.stat-num {
  font-size: 36px;
  font-weight: 600;
  color: #C9A84C;
}

.stat-num.small { font-size: 28px; }

.stat-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(232,228,221,0.35);
  margin-top: 4px;
}

/* ADMIN HEADER ROW */
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

/* LOGIN */
.login-box {
  max-width: 380px;
  margin: 80px auto;
  padding: 40px;
  background: linear-gradient(165deg, rgba(201,168,76,0.06), rgba(11,11,15,0.98));
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 12px;
  text-align: center;
  position: relative;
  z-index: 5;
}

.login-box h2 {
  font-size: 28px;
  color: #C9A84C;
  margin-top: 20px;
  margin-bottom: 6px;
}

.login-box .sub {
  font-size: 12px;
  color: rgba(232,228,221,0.35);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.login-error {
  color: #EF5350;
  font-size: 13px;
  margin-bottom: 14px;
  padding: 8px 14px;
  background: rgba(239,83,80,0.08);
  border-radius: 4px;
}

.form-input {
  width: 100%;
  padding: 10px 14px;
  background: rgba(232,228,221,0.04);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 14px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  outline: none;
  box-sizing: border-box;
  margin-bottom: 16px;
}

.form-input:focus { border-color: rgba(201,168,76,0.4); }

.form-select {
  width: 100%;
  padding: 10px 14px;
  background: #14141A;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 14px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  outline: none;
  box-sizing: border-box;
}

/* MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.overlay.hidden { display: none; }

.modal {
  background: #14141A;
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 32px;
  width: 90%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
}

.modal h3 {
  font-size: 24px;
  color: #C9A84C;
  margin-bottom: 24px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 16px;
}

.form-field { margin-bottom: 14px; }

.form-field label {
  display: block;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.5);
  margin-bottom: 6px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  margin-top: 4px;
}

.checkbox-row input {
  width: 18px;
  height: 18px;
  accent-color: #C9A84C;
  cursor: pointer;
}

.checkbox-row span {
  font-size: 13px;
  color: rgba(232,228,221,0.6);
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

/* NOTIFICATION */
.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 12px 24px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 100;
  backdrop-filter: blur(10px);
  transition: opacity 0.3s ease;
}

.notification.success {
  background: rgba(76,175,80,0.15);
  color: #66BB6A;
  border: 1px solid rgba(76,175,80,0.3);
}

.notification.error {
  background: rgba(239,83,80,0.15);
  color: #EF5350;
  border: 1px solid rgba(239,83,80,0.3);
}

.notification.hidden { display: none; }

/* FOOTER */
.footer {
  padding: 40px 28px;
  border-top: 1px solid rgba(201,168,76,0.08);
  text-align: center;
  position: relative;
  z-index: 5;
}

.footer span {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.25);
}

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 60px;
  color: rgba(232,228,221,0.25);
  font-size: 16px;
}

/* WATCH SVG PLACEHOLDER */
.watch-svg { opacity: 0.5; }

/* VIEW TOGGLE */
.view-section { display: none; }
.view-section.active { display: block; }
</style>
</head>
<body>

<!-- NOTIFICATION -->
<div id="notification" class="notification sans hidden"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo-area" id="logoArea">
    <div class="logo-circle" id="logoCircle">
      <svg class="watch-svg" id="logoSvg" width="32" height="32" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="26" stroke="#C9A84C" stroke-width="2.5"/>
        <circle cx="32" cy="32" r="22" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
        <line x1="32" y1="32" x2="32" y2="16" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="44" y2="32" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="2.5" fill="#C9A84C"/>
      </svg>
      <img id="logoImg" src="" alt="Logo" style="display:none;">
    </div>
    <div>
      <div class="brand-name">Connor Timepieces</div>
      <div class="brand-sub sans">Curated Luxury Since 2026</div>
    </div>
    <input type="file" accept="image/*" id="logoInput" class="hidden-input">
  </div>
  <nav class="nav sans" id="navBar">
    <button class="nav-btn active" data-view="storefront">Collection</button>
    <button class="nav-btn" data-view="login" id="adminBtn">Admin</button>
  </nav>
</header>

<!-- STOREFRONT -->
<div id="view-storefront" class="view-section active">
  <div class="hero">
    <div class="hero-sub sans">Exceptional Timepieces, Expertly Curated</div>
    <h1>The Collection</h1>
    <div class="hero-line"></div>
  </div>

  <div class="section" id="newArrivalsSection">
    <div class="section-title sans">
      <span>New Arrivals</span>
      <div class="title-line"></div>
    </div>
    <div class="arrivals-row" id="arrivalsRow"></div>
  </div>

  <div class="section">
    <div class="section-title sans">
      <span>Full Collection</span>
      <div class="title-line"></div>
    </div>
    <div class="filter-bar sans">
      <input class="search-input sans" placeholder="Search watches..." id="storeSearch">
      <button class="filter-chip sans active" data-filter="all">All</button>
      <button class="filter-chip sans" data-filter="new-arrivals">New Arrivals</button>
      <button class="filter-chip sans" data-filter="new">New</button>
      <button class="filter-chip sans" data-filter="pre-owned">Pre-Owned</button>
    </div>
    <div class="grid" id="storeGrid"></div>
    <div class="empty" id="storeEmpty" style="display:none;">No watches match your search</div>
  </div>

  <footer class="footer">
    <span class="sans" id="footerText"></span>
  </footer>
</div>

<!-- LOGIN -->
<div id="view-login" class="view-section">
  <div class="login-box">
    <svg width="56" height="56" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="26" stroke="#C9A84C" stroke-width="2.5"/>
      <circle cx="32" cy="32" r="22" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
      <line x1="32" y1="32" x2="32" y2="16" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
      <line x1="32" y1="32" x2="44" y2="32" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="2.5" fill="#C9A84C"/>
    </svg>
    <h2>Admin Access</h2>
    <p class="sub sans">Inventory Management Portal</p>
    <div id="loginError" class="login-error sans" style="display:none;"></div>
    <input class="form-input" id="loginUser" placeholder="Username">
    <input class="form-input" id="loginPass" type="password" placeholder="Password">
    <button class="btn-primary sans" style="width:100%;padding:12px 28px;" id="loginBtn">Authenticate</button>
  </div>
</div>

<!-- ADMIN -->
<div id="view-admin" class="view-section">
  <div class="section">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="admin-header">
      <div class="section-title sans" style="margin-bottom:0;">
        <span>Manage Inventory</span>
        <div class="title-line"></div>
      </div>
      <button class="btn-primary sans" id="addWatchBtn">+ Add Watch</button>
    </div>

    <div class="filter-bar sans">
      <input class="search-input sans" placeholder="Search inventory..." id="adminSearch">
      <button class="filter-chip sans active" data-admin-filter="all">All</button>
      <button class="filter-chip sans" data-admin-filter="new-arrivals">New Arrivals</button>
      <button class="filter-chip sans" data-admin-filter="new">New</button>
      <button class="filter-chip sans" data-admin-filter="pre-owned">Pre-Owned</button>
      <select class="sort-select sans" id="adminSort">
        <option value="name">Sort: Name</option>
        <option value="price-asc">Sort: Price Low</option>
        <option value="price-desc">Sort: Price High</option>
        <option value="year">Sort: Newest</option>
      </select>
    </div>

    <div class="grid" id="adminGrid"></div>
    <div class="empty" id="adminEmpty" style="display:none;">No watches match your criteria</div>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="overlay hidden">
  <div class="modal">
    <h3 id="modalTitle">Add New Watch</h3>
    <div class="form-grid">
      <div class="form-field"><label class="sans">Watch Name *</label><input class="form-input" id="fName"></div>
      <div class="form-field"><label class="sans">Brand *</label><input class="form-input" id="fBrand"></div>
      <div class="form-field"><label class="sans">Price ($)</label><input class="form-input" id="fPrice" type="number"></div>
      <div class="form-field"><label class="sans">Year</label><input class="form-input" id="fYear" type="number"></div>
      <div class="form-field"><label class="sans">Movement</label>
        <select class="form-select" id="fMovement"><option>Automatic</option><option>Manual</option><option>Quartz</option></select>
      </div>
      <div class="form-field"><label class="sans">Condition</label>
        <select class="form-select" id="fCondition"><option>New</option><option>Pre-Owned</option><option>Vintage</option></select>
      </div>
      <div class="form-field"><label class="sans">Case Material</label><input class="form-input" id="fCase"></div>
      <div class="form-field"><label class="sans">Dial Color</label><input class="form-input" id="fDial"></div>
    </div>
    <div class="form-field">
      <label class="sans">Watch Image</label>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="btn-edit sans" id="fImageBtn">Choose Image</button>
        <span class="sans" id="fImageLabel" style="font-size:12px;color:rgba(232,228,221,0.4);"></span>
        <input type="file" accept="image/*" id="fImageInput" class="hidden-input">
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="fNewArrival">
      <span class="sans">Mark as New Arrival</span>
    </div>
    <div class="modal-actions">
      <button class="btn-edit sans" style="padding:10px 24px;" id="modalCancel">Cancel</button>
      <button class="btn-primary sans" id="modalSave">Add to Inventory</button>
    </div>
  </div>
</div>

<script>
var ADMIN_USER = "admin";
var ADMIN_PASS = "admin123";

var inventory = [
  { id: 1, name: "Royal Oak Chronograph", brand: "Audemars Piguet", price: 38500, ref: "CT-2601", movement: "Automatic", caseMaterial: "Stainless Steel", dialColor: "Blue", condition: "New", year: 2025, isNewArrival: true, image: "" },
  { id: 2, name: "Submariner Date", brand: "Rolex", price: 14200, ref: "CT-2602", movement: "Automatic", caseMaterial: "Oystersteel", dialColor: "Black", condition: "Pre-Owned", year: 2023, isNewArrival: false, image: "" },
  { id: 3, name: "Speedmaster Moonwatch", brand: "Omega", price: 7100, ref: "CT-2603", movement: "Manual", caseMaterial: "Stainless Steel", dialColor: "Black", condition: "New", year: 2025, isNewArrival: true, image: "" },
  { id: 4, name: "Nautilus", brand: "Patek Philippe", price: 142000, ref: "CT-2604", movement: "Automatic", caseMaterial: "Rose Gold", dialColor: "Green", condition: "New", year: 2024, isNewArrival: true, image: "" },
  { id: 5, name: "Santos de Cartier", brand: "Cartier", price: 8950, ref: "CT-2605", movement: "Automatic", caseMaterial: "Stainless Steel", dialColor: "Silver", condition: "Pre-Owned", year: 2022, isNewArrival: false, image: "" },
  { id: 6, name: "Big Pilot's Watch", brand: "IWC", price: 15600, ref: "CT-2606", movement: "Automatic", caseMaterial: "Titanium", dialColor: "Blue", condition: "New", year: 2025, isNewArrival: true, image: "" }
];

var isLoggedIn = false;
var currentView = "storefront";
var storeFilter = "all";
var adminFilter = "all";
var storeSearch = "";
var adminSearchTerm = "";
var adminSortBy = "name";
var editingId = null;
var logoUrl = "";
var watchImageData = "";

function $(id) { return document.getElementById(id); }
function formatPrice(p) { return "$" + p.toLocaleString("en-US"); }

function notify(msg, type) {
  var el = $("notification");
  el.textContent = msg;
  el.className = "notification sans " + (type || "success");
  setTimeout(function() { el.className = "notification sans hidden"; }, 3000);
}

function watchPlaceholderSvg() {
  return '<svg width="48" height="48" viewBox="0 0 64 64" fill="none" style="opacity:0.4;"><circle cx="32" cy="32" r="26" stroke="#C9A84C" stroke-width="2.5"/><line x1="32" y1="32" x2="32" y2="16" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/><line x1="32" y1="32" x2="44" y2="32" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/><circle cx="32" cy="32" r="2.5" fill="#C9A84C"/></svg>';
}

function condBadgeClass(c) { return c === "New" ? "cond-badge sans cond-new" : "cond-badge sans cond-preowned"; }

function makeCardHTML(w, showAdmin) {
  var imgHTML = w.image ? '<img src="' + w.image + '" alt="' + w.name + '">' : watchPlaceholderSvg();
  var adminBtns = "";
  if (showAdmin) {
    adminBtns = '<div class="card-actions"><button class="btn-edit sans" onclick="editWatch(' + w.id + ')">Edit</button><button class="btn-danger sans" onclick="deleteWatch(' + w.id + ')">Delete</button></div>';
  }
  return '<div class="card">' +
    '<div class="card-img-box">' + imgHTML + '</div>' +
    '<div class="watch-brand sans">' + w.brand + '</div>' +
    '<div class="watch-name">' + w.name + '</div>' +
    '<div class="detail-row sans" style="margin-top:10px;"><span>Ref: ' + w.ref + '</span><span class="' + condBadgeClass(w.condition) + '">' + w.condition + '</span></div>' +
    '<div class="detail-row sans"><span>' + w.movement + '</span><span>' + w.year + '</span></div>' +
    '<div class="detail-row sans"><span>' + w.caseMaterial + '</span><span>' + w.dialColor + ' Dial</span></div>' +
    '<div class="card-footer"><span class="watch-price">' + formatPrice(w.price) + '</span>' + adminBtns + '</div>' +
    '</div>';
}

function makeArrivalHTML(w) {
  var imgHTML = w.image ? '<img src="' + w.image + '" alt="' + w.name + '">' : watchPlaceholderSvg();
  return '<div class="arrival-card">' +
    '<div class="arrival-badge sans">Just In</div>' +
    '<div class="arrival-img-box">' + imgHTML + '</div>' +
    '<div class="watch-brand sans">' + w.brand + '</div>' +
    '<div class="watch-name" style="font-size:18px;">' + w.name + '</div>' +
    '<div class="detail-row sans" style="margin-top:8px;"><span>' + w.movement + ' &middot; ' + w.year + '</span></div>' +
    '<div class="watch-price" style="font-size:20px;margin-top:10px;">' + formatPrice(w.price) + '</div>' +
    '</div>';
}

function filterList(list, filterType, search) {
  return list.filter(function(w) {
    if (filterType === "new-arrivals" && !w.isNewArrival) return false;
    if (filterType === "pre-owned" && w.condition !== "Pre-Owned") return false;
    if (filterType === "new" && w.condition !== "New") return false;
    if (search) {
      var s = search.toLowerCase();
      if (w.name.toLowerCase().indexOf(s) === -1 && w.brand.toLowerCase().indexOf(s) === -1 && w.ref.toLowerCase().indexOf(s) === -1) return false;
    }
    return true;
  });
}

function sortList(list, sortBy) {
  return list.slice().sort(function(a, b) {
    if (sortBy === "price-asc") return a.price - b.price;
    if (sortBy === "price-desc") return b.price - a.price;
    if (sortBy === "year") return b.year - a.year;
    return a.name.localeCompare(b.name);
  });
}

function renderStorefront() {
  // New arrivals
  var arrivals = inventory.filter(function(w) { return w.isNewArrival; });
  var arrivalsSection = $("newArrivalsSection");
  var arrivalsRow = $("arrivalsRow");
  if (arrivals.length > 0) {
    arrivalsSection.style.display = "";
    arrivalsRow.innerHTML = arrivals.map(function(w) { return makeArrivalHTML(w); }).join("");
  } else {
    arrivalsSection.style.display = "none";
  }

  // Full grid
  var filtered = sortList(filterList(inventory, storeFilter, storeSearch), "name");
  var grid = $("storeGrid");
  grid.innerHTML = filtered.map(function(w) { return makeCardHTML(w, false); }).join("");
  $("storeEmpty").style.display = filtered.length === 0 ? "" : "none";
  $("footerText").textContent = "Connor Timepieces \u00B7 " + inventory.length + " Timepieces in Collection";
}

function renderAdmin() {
  // Stats
  var newCount = inventory.filter(function(w) { return w.isNewArrival; }).length;
  var preOwned = inventory.filter(function(w) { return w.condition === "Pre-Owned"; }).length;
  var totalVal = inventory.reduce(function(s, w) { return s + w.price; }, 0);
  $("statsGrid").innerHTML =
    '<div class="stat"><div class="stat-num">' + inventory.length + '</div><div class="stat-label sans">Total Watches</div></div>' +
    '<div class="stat"><div class="stat-num">' + newCount + '</div><div class="stat-label sans">New Arrivals</div></div>' +
    '<div class="stat"><div class="stat-num">' + preOwned + '</div><div class="stat-label sans">Pre-Owned</div></div>' +
    '<div class="stat"><div class="stat-num small">' + formatPrice(totalVal) + '</div><div class="stat-label sans">Total Value</div></div>';

  // Grid
  var filtered = sortList(filterList(inventory, adminFilter, adminSearchTerm), adminSortBy);
  $("adminGrid").innerHTML = filtered.map(function(w) { return makeCardHTML(w, true); }).join("");
  $("adminEmpty").style.display = filtered.length === 0 ? "" : "none";
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll(".view-section").forEach(function(el) { el.classList.remove("active"); });
  $("view-" + view).classList.add("active");

  document.querySelectorAll(".nav-btn").forEach(function(btn) { btn.classList.remove("active"); });
  var activeBtn = document.querySelector('.nav-btn[data-view="' + view + '"]');
  if (activeBtn) activeBtn.classList.add("active");

  if (view === "storefront") renderStorefront();
  if (view === "admin") renderAdmin();
}

function updateNav() {
  var nav = $("navBar");
  if (isLoggedIn) {
    nav.innerHTML =
      '<button class="nav-btn active" data-view="storefront">Collection</button>' +
      '<button class="nav-btn" data-view="admin">Inventory</button>' +
      '<button class="nav-btn logout" id="logoutBtn">Logout</button>';
    $("logoutBtn").onclick = function() {
      isLoggedIn = false;
      updateNav();
      switchView("storefront");
    };
  } else {
    nav.innerHTML =
      '<button class="nav-btn active" data-view="storefront">Collection</button>' +
      '<button class="nav-btn" data-view="login" id="adminBtn">Admin</button>';
  }
  nav.querySelectorAll(".nav-btn[data-view]").forEach(function(btn) {
    btn.onclick = function() { switchView(btn.getAttribute("data-view")); };
  });
}

// LOGIN
$("loginBtn").onclick = function() {
  var user = $("loginUser").value;
  var pass = $("loginPass").value;
  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    isLoggedIn = true;
    $("loginError").style.display = "none";
    $("loginUser").value = "";
    $("loginPass").value = "";
    updateNav();
    switchView("admin");
    notify("Welcome back, Admin");
  } else {
    $("loginError").textContent = "Invalid credentials";
    $("loginError").style.display = "";
  }
};

$("loginPass").onkeydown = function(e) { if (e.key === "Enter") $("loginBtn").click(); };

// LOGO UPLOAD
$("logoArea").onclick = function() { $("logoInput").click(); };
$("logoInput").onchange = function(e) {
  var file = e.target.files[0];
  if (file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      logoUrl = ev.target.result;
      $("logoSvg").style.display = "none";
      $("logoImg").src = logoUrl;
      $("logoImg").style.display = "";
    };
    reader.readAsDataURL(file);
  }
};

// STORE FILTERS
document.querySelectorAll("[data-filter]").forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll("[data-filter]").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    storeFilter = btn.getAttribute("data-filter");
    renderStorefront();
  };
});

$("storeSearch").oninput = function() {
  storeSearch = this.value;
  renderStorefront();
};

// ADMIN FILTERS
document.querySelectorAll("[data-admin-filter]").forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll("[data-admin-filter]").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    adminFilter = btn.getAttribute("data-admin-filter");
    renderAdmin();
  };
});

$("adminSearch").oninput = function() {
  adminSearchTerm = this.value;
  renderAdmin();
};

$("adminSort").onchange = function() {
  adminSortBy = this.value;
  renderAdmin();
};

// MODAL
function openModal(watch) {
  editingId = watch ? watch.id : null;
  $("modalTitle").textContent = watch ? "Edit Watch" : "Add New Watch";
  $("modalSave").textContent = watch ? "Update Watch" : "Add to Inventory";
  $("fName").value = watch ? watch.name : "";
  $("fBrand").value = watch ? watch.brand : "";
  $("fPrice").value = watch ? watch.price : 0;
  $("fYear").value = watch ? watch.year : 2025;
  $("fMovement").value = watch ? watch.movement : "Automatic";
  $("fCondition").value = watch ? watch.condition : "New";
  $("fCase").value = watch ? watch.caseMaterial : "";
  $("fDial").value = watch ? watch.dialColor : "";
  $("fNewArrival").checked = watch ? watch.isNewArrival : false;
  watchImageData = watch ? watch.image : "";
  $("fImageLabel").textContent = watchImageData ? "Image uploaded" : "";
  $("modalOverlay").classList.remove("hidden");
}

function closeModal() {
  $("modalOverlay").classList.add("hidden");
  editingId = null;
  watchImageData = "";
}

$("addWatchBtn").onclick = function() { openModal(null); };
$("modalCancel").onclick = closeModal;
$("modalOverlay").onclick = function(e) { if (e.target === this) closeModal(); };

$("fImageBtn").onclick = function() { $("fImageInput").click(); };
$("fImageInput").onchange = function(e) {
  var file = e.target.files[0];
  if (file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      watchImageData = ev.target.result;
      $("fImageLabel").textContent = "Image uploaded";
    };
    reader.readAsDataURL(file);
  }
};

$("modalSave").onclick = function() {
  var name = $("fName").value.trim();
  var brand = $("fBrand").value.trim();
  if (!name || !brand) { notify("Name and Brand are required", "error"); return; }

  if (editingId) {
    for (var i = 0; i < inventory.length; i++) {
      if (inventory[i].id === editingId) {
        inventory[i].name = name;
        inventory[i].brand = brand;
        inventory[i].price = Number($("fPrice").value) || 0;
        inventory[i].year = Number($("fYear").value) || 2025;
        inventory[i].movement = $("fMovement").value;
        inventory[i].condition = $("fCondition").value;
        inventory[i].caseMaterial = $("fCase").value;
        inventory[i].dialColor = $("fDial").value;
        inventory[i].isNewArrival = $("fNewArrival").checked;
        if (watchImageData) inventory[i].image = watchImageData;
        break;
      }
    }
    notify("Watch updated successfully");
  } else {
    var maxId = 0;
    for (var j = 0; j < inventory.length; j++) { if (inventory[j].id > maxId) maxId = inventory[j].id; }
    var newId = maxId + 1;
    inventory.push({
      id: newId,
      name: name,
      brand: brand,
      price: Number($("fPrice").value) || 0,
      ref: "CT-" + (2600 + newId),
      movement: $("fMovement").value,
      caseMaterial: $("fCase").value,
      dialColor: $("fDial").value,
      condition: $("fCondition").value,
      year: Number($("fYear").value) || 2025,
      isNewArrival: $("fNewArrival").checked,
      image: watchImageData
    });
    notify("Watch added to inventory");
  }
  closeModal();
  renderAdmin();
  renderStorefront();
};

// GLOBAL FUNCTIONS FOR INLINE ONCLICK
window.editWatch = function(id) {
  var w = null;
  for (var i = 0; i < inventory.length; i++) { if (inventory[i].id === id) { w = inventory[i]; break; } }
  if (w) openModal(w);
};

window.deleteWatch = function(id) {
  inventory = inventory.filter(function(w) { return w.id !== id; });
  notify("Watch removed from inventory");
  renderAdmin();
  renderStorefront();
};

// NAV SETUP
document.querySelectorAll(".nav-btn[data-view]").forEach(function(btn) {
  btn.onclick = function() { switchView(btn.getAttribute("data-view")); };
});

// INITIAL RENDER
renderStorefront();
</script>
</body>
</html>
